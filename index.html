<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEALTH OS — LIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* Design matching your original WealthOS file */
:root { --bg: #070b10; --bg2: #0c1219; --border: #1c2d42; --g: #00ffa3; --b: #38bdf8; --y: #fbbf24; --p: #a78bfa; --txt: #ddeeff; --txt3: #2d4460; --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif; --display: 'Bebas Neue', sans-serif; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--txt); font-family: var(--sans); min-height: 100vh; }
header { padding: 12px 28px; background: rgba(7,11,16,0.92); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
.logo { font-family: var(--display); font-size: 1.5rem; letter-spacing: 0.12em; color: var(--g); }
#loader { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: var(--mono); color: var(--g); }
main { padding: 20px 28px; max-width: 1400px; margin: 0 auto; }
.grid-top { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.grid-main { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; }
.kpi-big { font-family: var(--display); font-size: 2.5rem; color: var(--g); line-height: 1; }
.label { font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.15em; color: var(--txt3); text-transform: uppercase; margin-top: 5px; }
.h300 { position: relative; height: 300px; }
@media(max-width:1000px) { .grid-top { grid-template-columns: 1fr 1fr; } .grid-main { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div id="loader">
  <div>INITIALIZING WEALTH OS...</div>
  <div id="status" style="font-size: 0.6rem; color: var(--txt3); margin-top: 10px;">Fetching Ledger & Assets...</div>
</div>

<header>
  <div class="logo">WEALTH<span style="color:var(--txt3)">OS</span></div>
  <div style="font-family:var(--mono); font-size:0.7rem;">€<span id="hdr-nw" style="color:var(--g)">0.00</span></div>
</header>

<main>
  <div class="grid-top">
    <div class="card"><div class="kpi-big" id="ov-nw">€0</div><div class="label">Net Worth</div></div>
    <div class="card"><div class="kpi-big" id="ov-growth" style="color:var(--b)">+€0</div><div class="label">Growth</div></div>
    <div class="card"><div class="kpi-big" id="ov-fire" style="color:var(--y)">0%</div><div class="label">FIRE Goal</div></div>
    <div class="card"><div class="kpi-big" id="ov-count" style="color:var(--p)">0</div><div class="label">Entries</div></div>
  </div>

  <div class="grid-main">
    <div class="card"><div class="label" style="margin-bottom:15px">History</div><div class="h300"><canvas id="chart-nw"></canvas></div></div>
    <div class="card"><div class="label" style="margin-bottom:15px">Asset Allocation</div><div class="h300"><canvas id="chart-assets"></canvas></div></div>
  </div>
</main>

<script>
const CONFIG = {
  apiKey: 'AIzaSyAbTJNnWCixdHO0pG8I5xBKm-_JxEGWz1U', 
  sheetId: '1n8-7_6vy5onfQro8Kp73sxZrUl0DXGvfvh1ccaoFvY4',
  tabs: { ledger: 'LEDGER', assets: 'ASSETS' }
};

async function init() {
  try {
    const [lRaw, aRaw] = await Promise.all([
      fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.sheetId}/values/${CONFIG.tabs.ledger}?key=${CONFIG.apiKey}`).then(r => r.json()),
      fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.sheetId}/values/${CONFIG.tabs.assets}?key=${CONFIG.apiKey}`).then(r => r.json())
    ]);

    // Process Ledger (Dates: Col A [0], Net Worth: Col G [6])
    const history = lRaw.values.slice(1)
      .filter(r => r[0] && r[6])
      .map(r => ({ d: r[0], v: parseFloat(r[6].replace(/[€, \s]/g, '')) }))
      .filter(item => !isNaN(item.v));

    // Process Assets (Asset Name: Col A [0], Value: Col B [1])
    const assets = aRaw.values.slice(1)
      .filter(r => r[0] && r[1])
      .map(r => ({ name: r[0], val: parseFloat(r[1].replace(/[€, \s]/g, '')) }))
      .filter(item => !isNaN(item.val));

    updateUI(history, assets);
    document.getElementById('loader').style.display = 'none';
  } catch (err) {
    document.getElementById('status').innerText = "CONNECTION ERROR: Check Share Settings";
  }
}

function updateUI(history, assets) {
  const current = history[history.length - 1].v;
  const growth = current - history[0].v;
  
  document.getElementById('hdr-nw').innerText = current.toLocaleString();
  document.getElementById('ov-nw').innerText = '€' + current.toLocaleString(undefined, {maximumFractionDigits:0});
  document.getElementById('ov-growth').innerText = (growth >= 0 ? '+€' : '-€') + Math.abs(growth).toLocaleString(undefined, {maximumFractionDigits:0});
  document.getElementById('ov-count').innerText = history.length;
  document.getElementById('ov-fire').innerText = ((current / 1000000) * 1
